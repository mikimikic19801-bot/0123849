<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Profit</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(23, 28, 38, 0.8);
            --accent: #f5e000;
            --accent-glow: rgba(245, 224, 0, 0.3);
            --success: #00ff9d;
            --danger: #ff3e3e;
            --text-main: #ffffff;
            --text-dim: #8a8f98;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a1f2e, var(--bg));
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            animation: appEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 18px;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(245, 224, 0, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stake-hero {
            background: linear-gradient(145deg, var(--accent), #dcc900);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(245, 224, 0, 0.2);
        }

        .stake-hero::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
        }

        .stake-hero small {
            color: rgba(0,0,0,0.6);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
        }

        .stake-hero .value {
            color: #000;
            font-size: 56px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
            letter-spacing: -2px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.94); }

        .btn-success {
            background: var(--success);
            color: #003d26;
            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.2);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2);
        }

        .status-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-group { text-align: center; flex: 1; }
        .stat-group:first-child { text-align: left; }
        .stat-group:last-child { text-align: right; }

        .stat-val { font-size: 18px; font-weight: 800; display: block; margin-top: 4px; }
        
        .log-container {
            margin-top: 20px;
            max-height: 120px;
            overflow-y: auto;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px;
            color: var(--text-dim);
        }

        .reset-trigger {
            color: var(--text-dim);
            font-size: 11px;
            text-align: center;
            display: block;
            margin-top: 20px;
            text-decoration: none;
            font-weight: 600;
            opacity: 0.5;
        }

        /* Sakrivanje scrollbar-a */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="glass-card">
        <div class="input-row">
            <div>
                <span class="field-label">Osnovna Banka</span>
                <input type="number" id="bank" value="500" oninput="recalc()">
            </div>
            <div>
                <span class="field-label">Cilj Profit</span>
                <input type="number" id="target" value="20" oninput="recalc()">
            </div>
        </div>
        <div>
            <span class="field-label">Kvota</span>
            <input type="number" id="odds" value="2.00" step="0.01" oninput="recalc()">
        </div>
    </div>

    <div class="stake-hero" id="stakeCard">
        <small>Predloženi Ulog</small>
        <span class="value" id="stakeVal">0.00</span>
    </div>

    <div class="action-grid">
        <button class="btn btn-success" onclick="execute(true)">Dobitak</button>
        <button class="btn btn-danger" onclick="execute(false)">Gubitak</button>
    </div>

    <div class="glass-card" style="margin-top: 20px; padding: 20px;">
        <div class="status-footer">
            <div class="stat-group">
                <span class="field-label">Akumulirano</span>
                <span id="lossVal" class="stat-val" style="color:var(--danger)">0.00</span>
            </div>
            <div class="stat-group">
                <span class="field-label">Ukupni P/L</span>
                <span id="pnlVal" class="stat-val">0.00</span>
            </div>
        </div>
        <div class="log-container" id="logList"></div>
        <a href="#" class="reset-trigger" onclick="fullReset()">Resetuj kompletnu sesiju</a>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    let sessionLoss = 0;
    let initialSeed = 500;

    function recalc() {
        const t = parseFloat(document.getElementById('target').value) || 0;
        const q = parseFloat(document.getElementById('odds').value) || 0;
        const b = parseFloat(document.getElementById('bank').value) || 0;
        
        let s = q > 1 ? (sessionLoss + t) / (q - 1) : 0;
        document.getElementById('stakeVal').innerText = s.toFixed(2);
        document.getElementById('lossVal').innerText = sessionLoss.toFixed(2);
        
        const diff = b - initialSeed;
        const pnl = document.getElementById('pnlVal');
        pnl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2);
        pnl.style.color = diff >= 0 ? "var(--success)" : "var(--danger)";
    }

    function execute(win) {
        const s = parseFloat(document.getElementById('stakeVal').innerText);
        const bEl = document.getElementById('bank');
        let b = parseFloat(bEl.value);

        if (win) {
            const q = parseFloat(document.getElementById('odds').value);
            const net = (s * q) - s;
            bEl.value = (b + net).toFixed(2);
            sessionLoss = 0;
            pushLog(`+${net.toFixed(2)}`, 'success');
        } else {
            bEl.value = (b - s).toFixed(2);
            sessionLoss += s;
            pushLog(`-${s.toFixed(2)}`, 'danger');
        }
        recalc();
    }

    function pushLog(val, type) {
        const l = document.getElementById('logList');
        l.innerHTML = `<div class="log-entry"><span>Sesija #${l.children.length + 1}</span><span style="color:var(--${type}); font-weight:800">${val}</span></div>` + l.innerHTML;
    }

    function fullReset() { if(confirm("Brišeš sve podatke?")) location.reload(); }
    window.onload = () => { initialSeed = parseFloat(document.getElementById('bank').value); recalc(); };
</script>
</body>
</html>
