<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Manager Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5e000">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #f5e000; --green: #2ecc71; --red: #e74c3c; --text: #ffffff; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; margin-top: 10px; }
        .card { background: var(--card); border-radius: 10px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 15px; border: 1px solid #333; }
        .label { font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input { width: 100%; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        .stake-box { background: var(--accent); color: #000; padding: 30px 20px; border-radius: 10px; text-align: center; margin: 15px 0; }
        .stake-box small { font-weight: 800; text-transform: uppercase; display: block; font-size: 13px; margin-bottom: 5px; }
        .stake-box .amount { font-size: 52px; font-weight: 900; font-family: 'Oswald', sans-serif; line-height: 1; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 16px; border: none; border-radius: 6px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 16px; }
        .btn-win { background: var(--green); color: white; }
        .btn-loss { background: var(--red); color: white; }
        .btn-reset { background: transparent; color: #555; grid-column: span 2; font-size: 11px; margin-top: 5px; }
        .stats-footer { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #333; margin-top: 15px; }
        .stat-val { font-weight: 700; color: #fff; }
        #log { max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="input-grid">
            <div><div class="label">Banka</div><input type="number" id="bank" value="100" oninput="update()"></div>
            <div><div class="label">Cilj</div><input type="number" id="target" value="10" oninput="update()"></div>
        </div>
        <div style="margin-top: 15px;">
            <div class="label">Kvota</div>
            <input type="number" id="odds" value="2.00" step="0.01" oninput="update()">
        </div>
    </div>
    <div class="stake-box">
        <small>POTREBAN ULOG</small>
        <div class="amount" id="stakeDisplay">0.00</div>
    </div>
    <div class="btns">
        <button class="btn-win" onclick="handle(true)">PROLAZ ✅</button>
        <button class="btn-loss" onclick="handle(false)">PAD ❌</button>
        <button class="btn-reset" onclick="resetApp()">Poništi sve</button>
    </div>
    <div class="card">
        <div class="stats-footer">
            <div><span class="label">Minus:</span> <span id="lossDisplay" class="stat-val">0.00</span></div>
            <div><span class="label">P/L:</span> <span id="pnlDisplay" class="stat-val">0.00</span></div>
        </div>
        <div id="log"></div>
    </div>
</div>

<script>
    // Registracija Service Workera za offline rad
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    let currentLoss = 0;
    let initialBank = 100;

    function update() {
        const target = parseFloat(document.getElementById('target').value) || 0;
        const odds = parseFloat(document.getElementById('odds').value) || 0;
        const bank = parseFloat(document.getElementById('bank').value) || 0;
        let stake = odds > 1 ? (currentLoss + target) / (odds - 1) : 0;
        document.getElementById('stakeDisplay').innerText = stake.toFixed(2);
        document.getElementById('lossDisplay').innerText = currentLoss.toFixed(2);
        const pnl = bank - initialBank;
        const pnlEl = document.getElementById('pnlDisplay');
        pnlEl.innerText = (pnl >= 0 ? "+" : "") + pnl.toFixed(2);
        pnlEl.style.color = pnl >= 0 ? "var(--green)" : "var(--red)";
    }

    function handle(isWin) {
        const stake = parseFloat(document.getElementById('stakeDisplay').innerText);
        const bankEl = document.getElementById('bank');
        let currentBank = parseFloat(bankEl.value);
        if (isWin) {
            const odds = parseFloat(document.getElementById('odds').value);
            bankEl.value = (currentBank + (stake * odds) - stake).toFixed(2);
            currentLoss = 0;
            addLog(`+${((stake * odds) - stake).toFixed(2)}`, 'win');
        } else {
            bankEl.value = (currentBank - stake).toFixed(2);
            currentLoss += stake;
            addLog(`-${stake.toFixed(2)}`, 'loss');
        }
        update();
    }

    function addLog(txt, res) {
        const log = document.getElementById('log');
        log.innerHTML = `<div class="log-item"><span style="color:#666">Tiket #${log.children.length + 1}</span><span style="color:${res === 'win' ? 'var(--green)' : 'var(--red)'}; font-weight:bold">${txt}</span></div>` + log.innerHTML;
    }

    function resetApp() { if(confirm("Obriši sve?")) location.reload(); }
    window.onload = () => { initialBank = parseFloat(document.getElementById('bank').value); update(); };
</script>
</body>
</html>
